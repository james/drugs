name: Playwright Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: playwright-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Run Playwright tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install flask pytest pytest-playwright playwright

      - name: Install Playwright browsers
        run: playwright install --with-deps chromium

      - name: Run Playwright tests
        id: run-tests
        run: |
          set +e
          python -m pytest test_features.py -v \
            --tracing=on \
            --screenshot=on \
            --output=test-results \
            2>&1 | tee pytest-output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
        env:
          PYTHONUNBUFFERED: "1"

      - name: Build report
        if: always()
        id: build-report
        run: |
          python << 'PYEOF'
          import json, os, glob, shutil, re
          from datetime import datetime, timezone

          report_dir = "playwright-report"
          results_dir = "test-results"
          os.makedirs(report_dir, exist_ok=True)

          # Parse pytest output for per-test pass/fail and duration
          test_results = {}
          duration = "?"
          try:
              with open("pytest-output.txt") as f:
                  for line in f:
                      m = re.match(r"test_features\.py::(\S+)\s+(PASSED|FAILED)", line)
                      if m:
                          test_results[m.group(1)] = m.group(2).lower()
                      dm = re.match(r".*in ([\d.]+)s", line)
                      if dm:
                          duration = dm.group(1)
          except FileNotFoundError:
              pass

          test_names = [
              "test_index_loads",
              "test_empty_submission_stays_on_index",
              "test_young_male_clubber",
              "test_older_married_christian_woman",
              "test_student_in_south_west",
              "test_middle_aged_employed_white_male",
              "test_single_answer_only",
              "test_results_contain_drug_classifications",
              "test_start_again_returns_to_form",
          ]

          tests = []
          all_screenshots = []

          for name in test_names:
              test_dir = os.path.join(results_dir, f"test-features-py-{name}-chromium")
              trace_file = None
              if os.path.isdir(test_dir):
                  for t in glob.glob(os.path.join(test_dir, "trace.zip")):
                      dest = f"{name}-trace.zip"
                      shutil.copy2(t, os.path.join(report_dir, dest))
                      trace_file = dest
                  for img in sorted(glob.glob(os.path.join(test_dir, "*.png"))):
                      dest = f"{name}.png"
                      shutil.copy2(img, os.path.join(report_dir, dest))
                      all_screenshots.append({
                          "name": name.replace("_", " ").replace("test ", ""),
                          "path": dest,
                      })

              tests.append({
                  "name": name.replace("_", " ").replace("test ", ""),
                  "status": test_results.get(name, "unknown"),
                  "trace": trace_file,
              })

          passed = sum(1 for t in tests if t["status"] == "passed")
          failed = sum(1 for t in tests if t["status"] == "failed")

          data = {
              "tests": tests,
              "screenshots": all_screenshots,
              "duration": duration,
              "timestamp": datetime.now(timezone.utc).strftime("%Y-%m-%d %H:%M UTC"),
              "commit": os.environ.get("GITHUB_SHA", "local")[:8],
          }

          with open(os.path.join(report_dir, "results.json"), "w") as f:
              json.dump(data, f, indent=2)

          # Write summary for the PR comment step
          with open(os.environ["GITHUB_OUTPUT"], "a") as out:
              out.write(f"passed={passed}\n")
              out.write(f"failed={failed}\n")
              out.write(f"total={len(tests)}\n")
              out.write(f"duration={duration}\n")

          # Build per-test markdown table for PR comment
          lines = []
          for t in tests:
              icon = {"passed": "\u2705", "failed": "\u274c"}.get(t["status"], "\u2753")
              lines.append(f"| {icon} | {t['name']} | {t['status']} |")
          table = "\n".join(lines)
          # Use a file for multi-line output
          with open("pr-comment-table.md", "w") as f:
              f.write(table)

          print(f"Report: {passed} passed, {failed} failed, {len(all_screenshots)} screenshots")
          PYEOF

          # Write the report HTML
          cat > playwright-report/index.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
          <meta charset="utf-8">
          <meta name="viewport" content="width=device-width, initial-scale=1">
          <title>Playwright Test Report</title>
          <style>
            :root { --bg: #f5f0e8; --ink: #1a1a18; --green: #27613b; --red: #c23616; --muted: #7f8c8d; --border: #e8e0d0; }
            * { margin: 0; padding: 0; box-sizing: border-box; }
            body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--ink); min-height: 100vh; }
            .header { text-align: center; padding: 2rem 1rem; border-bottom: 4px double var(--ink); max-width: 900px; margin: 0 auto; }
            .header h1 { font-size: 1.8rem; margin-bottom: 0.3rem; }
            .header .meta { font-size: 0.85rem; color: var(--muted); }
            .container { max-width: 900px; margin: 0 auto; padding: 1.5rem; }
            .summary { display: flex; gap: 1rem; justify-content: center; margin: 1.5rem 0; flex-wrap: wrap; }
            .stat { text-align: center; padding: 1rem 2rem; border: 1px solid var(--border); background: white; min-width: 120px; }
            .stat .num { font-size: 2rem; font-weight: 700; }
            .stat .label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; }
            .stat.pass .num { color: var(--green); }
            .stat.fail .num { color: var(--red); }
            table { width: 100%; border-collapse: collapse; margin-top: 1.5rem; background: white; }
            th, td { padding: 0.75rem 1rem; text-align: left; border-bottom: 1px solid var(--border); }
            th { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); background: var(--bg); }
            .badge { display: inline-block; font-size: 0.7rem; font-weight: 700; padding: 0.15rem 0.5rem; border-radius: 2px; color: white; text-transform: uppercase; }
            .badge.passed { background: var(--green); }
            .badge.failed { background: var(--red); }
            .badge.unknown { background: var(--muted); }
            .trace-link { font-size: 0.8rem; }
            .screenshots { margin-top: 2rem; }
            .screenshots h2 { font-size: 1.2rem; margin-bottom: 1rem; }
            .screenshot-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1rem; }
            .screenshot-card { border: 1px solid var(--border); background: white; overflow: hidden; }
            .screenshot-card img { width: 100%; display: block; }
            .screenshot-card .caption { padding: 0.5rem 0.75rem; font-size: 0.8rem; color: var(--muted); }
            .footer { text-align: center; padding: 2rem; font-size: 0.8rem; color: var(--muted); }
          </style>
          </head>
          <body>
          <div class="header">
            <h1>Playwright Test Report</h1>
            <p class="meta">What Drugs Does The Government Think You Do?</p>
          </div>
          <div class="container" id="content">
            <noscript><p>Enable JavaScript to view this report.</p></noscript>
          </div>
          <script>
            fetch('results.json').then(r => r.json()).then(data => {
              const el = document.getElementById('content');
              const passed = data.tests.filter(t => t.status === 'passed').length;
              const failed = data.tests.filter(t => t.status === 'failed').length;
              const total = data.tests.length;

              let html = `
                <div class="summary">
                  <div class="stat"><div class="num">${total}</div><div class="label">Total</div></div>
                  <div class="stat pass"><div class="num">${passed}</div><div class="label">Passed</div></div>
                  <div class="stat ${failed > 0 ? 'fail' : ''}"><div class="num">${failed}</div><div class="label">Failed</div></div>
                  <div class="stat"><div class="num">${data.duration}s</div><div class="label">Duration</div></div>
                </div>
                <table>
                  <thead><tr><th>Test</th><th>Status</th><th>Trace</th></tr></thead>
                  <tbody>`;

              data.tests.forEach(t => {
                const traceHtml = t.trace
                  ? `<a class="trace-link" href="https://trace.playwright.dev/?trace=${encodeURIComponent(window.location.origin + window.location.pathname.replace(/\/$/,'') + '/' + t.trace)}" target="_blank">View trace</a>`
                  : '';
                html += `<tr>
                  <td>${t.name}</td>
                  <td><span class="badge ${t.status}">${t.status}</span></td>
                  <td>${traceHtml}</td>
                </tr>`;
              });

              html += '</tbody></table>';

              if (data.screenshots && data.screenshots.length > 0) {
                html += '<div class="screenshots"><h2>Screenshots</h2><div class="screenshot-grid">';
                data.screenshots.forEach(s => {
                  html += `<div class="screenshot-card">
                    <img src="${s.path}" alt="${s.name}" loading="lazy">
                    <div class="caption">${s.name}</div>
                  </div>`;
                });
                html += '</div></div>';
              }

              html += `<div class="footer">
                Generated ${data.timestamp} &middot; Commit <code>${data.commit}</code>
              </div>`;

              el.innerHTML = html;
            });
          </script>
          </body>
          </html>
          HTMLEOF

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 30

      - name: Deploy report to GitHub Pages (main branch)
        if: always() && github.event_name == 'push'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./playwright-report
          keep_files: true

      - name: Deploy PR report to GitHub Pages
        if: always() && github.event_name == 'pull_request'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./playwright-report
          destination_dir: pr-${{ github.event.number }}
          keep_files: true

      - name: Comment on PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const passed = '${{ steps.build-report.outputs.passed }}';
            const failed = '${{ steps.build-report.outputs.failed }}';
            const total  = '${{ steps.build-report.outputs.total }}';
            const duration = '${{ steps.build-report.outputs.duration }}';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const pagesUrl = `https://${context.repo.owner}.github.io/${context.repo.repo}/pr-${context.issue.number}/`;

            let table = '';
            try { table = fs.readFileSync('pr-comment-table.md', 'utf8'); } catch {}

            const status = failed === '0' ? '✅ All tests passed' : `❌ ${failed} test(s) failed`;
            const body = [
              `## Playwright Test Report`,
              ``,
              `${status} — **${passed}/${total}** passed in ${duration}s`,
              ``,
              `| | Test | Status |`,
              `|---|---|---|`,
              table,
              ``,
              `🌐 [View full report](${pagesUrl})`,
              `📎 [Download artifacts](${runUrl}#artifacts) (traces, screenshots)`,
            ].join('\n');

            // Find and update existing comment, or create new one
            const marker = '## Playwright Test Report';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.startsWith(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail if tests failed
        if: always() && steps.run-tests.outputs.exit_code != '0'
        run: exit 1
